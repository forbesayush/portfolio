<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Product Manager Portfolio | Strategic & Data-Driven</title>
    <meta name="description" content="Portfolio of a Data-Driven, Strategic, and Execution-Focused Product Manager with an IT + Analytics + HR background.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (via CDN for local execution) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#000000',    // Black text
                        accent: '#2563eb',     // Base44 Blue (blue-600)
                        secondary: '#4b5563',  // Muted gray (slate-600)
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- React & ReactDOM (production builds for speed) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Global setup for Framer Motion to work without imports -->
    <script>
        window.framerMotion = window.Motion;
    </script>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-[#0f172a] dark:text-gray-100 antialiased selection:bg-accent selection:text-white">
    <div id="root"></div>

    <!-- Main App Logic -->
    <script type="text/babel" src="app.jsx"></script>
</body>
</html>
